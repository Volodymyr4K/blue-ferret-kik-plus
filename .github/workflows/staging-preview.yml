name: Staging Preview Build

on:
  push:
    branches: ['staging']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staging-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate media
        run: npm run validate:media

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build static preview
        env:
          NEXT_PUBLIC_SITE_URL: https://blueferret.com.ua
        run: npm run build

      - name: Upload staging preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-preview-out
          path: ./out
          retention-days: 7
