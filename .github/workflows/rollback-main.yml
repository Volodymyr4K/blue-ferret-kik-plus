name: Quick Rollback Main

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to revert in main'
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Revert selected commit
        run: git revert --no-edit "${{ github.event.inputs.commit_sha }}"

      - name: Push rollback commit
        run: git push origin main
