name: Quality Gate

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate media
        run: npm run validate:media

      - name: Validate links
        run: npm run validate:links

      - name: Validate copy limits
        run: npm run validate:copy

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://blueferret.com.ua
        run: npm run build
