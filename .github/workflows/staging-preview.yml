name: Staging Preview Build

on:
  push:
    branches: ['staging']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  staging-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate media
        run: npm run validate:media

      - name: Validate links
        run: npm run validate:links

      - name: Validate copy limits
        run: npm run validate:copy

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build static preview
        env:
          NEXT_PUBLIC_SITE_URL: https://blueferret.com.ua
        run: npm run build

      - name: Upload staging preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-preview-out
          path: ./out
          retention-days: 7

      - name: Comment PR with preview run
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              '## Preview Build',
              '',
              `Staging preview готовий. Відкрийте run: ${runUrl}`,
              '',
              'Що далі:',
              '1. Відкрити run',
              '2. Завантажити artifact `staging-preview-out`',
              '3. Перевірити сторінки перед merge',
            ].join('\n');
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body,
            });
