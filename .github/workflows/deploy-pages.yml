name: Legacy Deploy to GitHub Pages (manual only)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Validate media
        run: npm run validate:media

      - name: Validate links
        run: npm run validate:links

      - name: Validate copy limits
        run: npm run validate:copy

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          NEXT_PUBLIC_SITE_URL: https://blueferret.com.ua
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
