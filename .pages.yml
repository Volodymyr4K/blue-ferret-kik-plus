media:
  input: public/uploads
  output: /uploads
  categories: [image]
  rename: safe

content:
  - name: catalog
    label: Каталог
    type: group
    items:
      - name: games
        label: Ігри (товари)
        type: file
        path: src/content/games.json
        format: json
        list: true
        fields:
          - { name: id, label: ID, type: string, required: true }
          - name: slug
            label: Slug (латиниця)
            type: string
            required: true
            description: "Лише маленькі латинські букви, цифри і дефіс. Підказка: скористайтесь /admin-guide."
          - { name: name, label: Назва, type: string, required: true }
          - { name: slogan, label: Слоган, type: string }
          - { name: shortDescription, label: Короткий опис, type: text, required: true }
          - { name: aboutGame, label: Про гру, type: text }
          - name: status
            label: Статус
            type: select
            required: true
            options:
              values: [announcement, production, preorder, onsale]
          - { name: heroImage, label: Hero зображення, type: image }
          - { name: coverImage, label: Обкладинка, type: image }
          - { name: palette, label: Основний колір, type: string }
          - { name: accent, label: Акцентний колір, type: string }
          - { name: price, label: Ціна (грн), type: number }
          - name: passport
            label: Паспорт гри
            type: object
            fields:
              - { name: players, label: Гравці, type: string }
              - { name: duration, label: Тривалість, type: string }
              - { name: age, label: Вік, type: string }
              - { name: author, label: Автор(ка), type: string }
          - name: stages
            label: Етапи
            type: object
            fields:
              - name: announcement
                label: Анонс
                type: object
                fields: &stage_fields
                  - name: state
                    label: Стан
                    type: select
                    required: true
                    options:
                      values: [active, locked, archived, hidden]
                  - { name: title, label: Заголовок, type: string, required: true }
                  - { name: content, label: Контент, type: text }
                  - { name: image, label: Зображення, type: image }
                  - name: lastUpdate
                    label: Останнє оновлення (YYYY-MM-DD)
                    type: string
                    description: "Формат дати: 2026-04-09"
                  - { name: ctaText, label: Текст кнопки, type: string }
                  - name: ctaLink
                    label: Посилання кнопки
                    type: string
                    description: "Дозволено: /internal-path, https://..., mailto:..., tel:..."
              - name: production
                label: Виробництво
                type: object
                fields: *stage_fields
              - name: preorder
                label: Передзамовлення
                type: object
                fields: *stage_fields
              - name: onsale
                label: У продажі
                type: object
                fields: *stage_fields

      - name: projects
        label: Проєкти KIK
        type: file
        path: src/content/projects.json
        format: json
        list: true
        fields:
          - { name: id, label: ID, type: string, required: true }
          - { name: name, label: Назва, type: string, required: true }
          - { name: shortDescription, label: Короткий опис, type: text, required: true }
          - name: status
            label: Статус
            type: select
            required: true
            options:
              values: [active, preparing, complete]
          - { name: statusLabel, label: Текст статусу, type: string, required: true }
          - { name: raised, label: Зібрано, type: number, required: true }
          - { name: goal, label: Ціль, type: number, required: true }
          - { name: currency, label: Валюта, type: string, required: true }
          - name: lastUpdate
            label: Дата оновлення (YYYY-MM-DD)
            type: string
            required: true
            description: "Формат дати: 2026-04-09"
          - { name: updatePreview, label: Опис оновлення, type: text, required: true }
          - { name: coverImage, label: Обкладинка, type: image }
          - name: link
            label: Посилання (всередині сайту)
            type: string
            required: true
            description: "Формат: /kik/proekty/{id}"
          - name: support
            label: Параметри підтримки
            type: object
            fields:
              - { name: minDonation, label: Мінімум донату, type: number }
              - { name: defaultDonation, label: Донат за замовчуванням, type: number }
              - name: tiers
                label: Рівні підтримки
                type: object
                list: true
                fields:
                  - { name: id, label: ID рівня, type: string, required: true }
                  - { name: title, label: Назва, type: string, required: true }
                  - { name: description, label: Опис, type: text, required: true }
                  - { name: amount, label: Сума, type: number, required: true }
                  - { name: featured, label: Рекомендований, type: boolean }
                  - { name: includes, label: Що входить, type: string, list: true }

  - name: siteContent
    label: Основний контент сайту
    type: file
    path: src/content/site-content.json
    format: json
    fields:
      - name: brand
        label: Бренд
        type: object
        fields:
          - { name: name, label: Назва бренду, type: string, required: true }
          - { name: tagline, label: Tagline, type: string, required: true }
          - { name: description, label: Опис бренду, type: text, required: true }
          - { name: heroSubtitle, label: Hero підзаголовок, type: string, required: true }
          - { name: heroDescription, label: Hero опис, type: text, required: true }
          - { name: brandWords, label: Слова бренду, type: string, list: true }
          - { name: antiWords, label: Анти-слова бренду, type: string, list: true }
      - name: kik
        label: KIK
        type: object
        fields:
          - { name: name, label: Назва KIK, type: string, required: true }
          - { name: tagline, label: Tagline KIK, type: string, required: true }
          - { name: description, label: Опис KIK, type: text, required: true }
          - name: proKik
            label: Тексти сторінки Про KIK
            type: object
            fields:
              - { name: intro, label: Intro, type: text, required: true }
              - { name: story, label: Story, type: text, required: true }
              - { name: benefit, label: Benefit, type: text, required: true }
              - { name: trust, label: Trust, type: text, required: true }
      - name: about
        label: Хто ми
        type: object
        fields:
          - { name: title, label: Заголовок, type: string, required: true }
          - { name: subtitle, label: Підзаголовок, type: string, required: true }
          - { name: intro, label: Intro, type: text, required: true }
          - { name: paragraph2, label: Параграф 2, type: text, required: true }
          - { name: paragraph3, label: Параграф 3, type: text, required: true }
      - name: values
        label: Цінності
        type: object
        fields:
          - { name: title, label: Заголовок блоку, type: string, required: true }
          - name: items
            label: Пункти цінностей
            type: object
            list: true
            fields:
              - { name: title, label: Назва, type: string, required: true }
              - { name: description, label: Опис, type: text, required: true }
      - name: approach
        label: Підхід
        type: object
        fields:
          - { name: title, label: Заголовок блоку, type: string, required: true }
          - { name: items, label: Пункти підходу, type: string, list: true }
      - name: nav
        label: Навігація (контентні джерела)
        type: object
        fields:
          - { name: blueFerret, label: Blue Ferret меню, type: string, list: true }
          - { name: kik, label: KIK меню, type: string, list: true }
      - name: contacts
        label: Контакти
        type: object
        fields:
          - { name: email, label: Email, type: string, required: true }
          - { name: phone, label: Телефон, type: string, required: true }
          - { name: address, label: Адреса, type: string, required: true }
          - { name: intro, label: Intro, type: text, required: true }
          - { name: partnership, label: Партнерство текст, type: text, required: true }
          - name: social
            label: Соцмережі
            type: object
            fields:
              - { name: instagram, label: Instagram URL, type: string, required: true }
              - { name: facebook, label: Facebook URL, type: string, required: true, description: "Лише https:// посилання" }
              - { name: telegram, label: Telegram URL, type: string, required: true, description: "Лише https:// посилання" }
      - name: cta
        label: CTA блок
        type: object
        fields:
          - { name: title, label: Заголовок, type: string, required: true }
          - { name: subtitle, label: Підзаголовок, type: string, required: true }
          - { name: description, label: Опис, type: text, required: true }
      - name: pillars
        label: Pillars
        type: object
        list: true
        fields:
          - { name: title, label: Заголовок, type: string, required: true }
          - { name: description, label: Опис, type: text, required: true }
          - { name: href, label: Посилання (internal), type: string, required: true }
          - { name: icon, label: Іконка ID, type: string, required: true }
      - name: testimonial
        label: Відгуки
        type: object
        list: true
        fields:
          - { name: quote, label: Цитата, type: text, required: true }
          - { name: author, label: Автор, type: string, required: true }
          - { name: role, label: Роль, type: string }

